name: Push Daily SEO Brief to Telegram

on:
  push:
    paths:
      - 'reports/**.md'
    branches:
      - main
  workflow_dispatch:
    inputs:
      report_date:
        description: '指定日期（格式：YYYY-MM-DD），留空则使用最新文件'
        required: false
        default: ''

jobs:
  send-to-telegram:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get report file
        id: get_file
        run: |
          INPUT_DATE="${{ github.event.inputs.report_date }}"

          if [ -n "$INPUT_DATE" ]; then
            NEW_FILE="reports/$INPUT_DATE.md"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            NEW_FILE=$(ls reports/*.md 2>/dev/null | sort | tail -n 1)
          else
            NEW_FILE=$(git diff --name-only HEAD~1 HEAD -- 'reports/*.md' | head -n 1)
          fi

          if [ -z "$NEW_FILE" ]; then
            echo "No report file found, exiting."
            exit 1
          fi

          if [ ! -f "$NEW_FILE" ]; then
            echo "File $NEW_FILE does not exist, exiting."
            exit 1
          fi

          echo "file=$NEW_FILE" >> $GITHUB_OUTPUT
          echo "Using file: $NEW_FILE"

      - name: Send to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          REPORT_FILE: ${{ steps.get_file.outputs.file }}
        run: |
          python3 << 'PYEOF'
          import os
          import requests

          token = os.environ["TELEGRAM_BOT_TOKEN"]
          chat_id = os.environ["TELEGRAM_CHAT_ID"]
          report_file = os.environ["REPORT_FILE"]

          with open(report_file, "r", encoding="utf-8") as f:
              content = f.read()

          # 提取日期作为开头标题
          date = os.path.basename(report_file).replace(".md", "")
          header = f"📋 *每日 SEO 情报简报 — {date}*\n\n"
          content = header + content

          url = f"https://api.telegram.org/bot{token}/sendMessage"

          # Telegram 单条消息上限 4096 字符，按 4000 分段保留余量
          MAX_LEN = 4000
          chunks = []
          while len(content) > MAX_LEN:
              # 尽量在换行处截断
              split_pos = content.rfind('\n', 0, MAX_LEN)
              if split_pos == -1:
                  split_pos = MAX_LEN
              chunks.append(content[:split_pos])
              content = content[split_pos:].lstrip('\n')
          if content:
              chunks.append(content)

          total = len(chunks)
          print(f"Total chunks to send: {total}")

          for i, chunk in enumerate(chunks):
              part_label = f"（{i+1}/{total}）\n\n" if total > 1 else ""
              payload = {
                  "chat_id": chat_id,
                  "text": part_label + chunk,
                  "parse_mode": "Markdown"
              }
              response = requests.post(url, json=payload)
              print(f"Chunk {i+1}: status={response.status_code}")

              # 如果 Markdown 解析失败，降级为纯文本重试
              if response.status_code != 200:
                  print(f"Markdown failed, retrying as plain text...")
                  payload["parse_mode"] = ""
                  response = requests.post(url, json=payload)
                  print(f"Chunk {i+1} retry: status={response.status_code}, body={response.text}")

              if response.status_code != 200:
                  raise Exception(f"Failed to send chunk {i+1}: {response.text}")

          print("All chunks sent successfully.")
          PYEOF
